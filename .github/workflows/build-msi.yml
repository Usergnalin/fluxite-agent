name: Build MSI Installer

on:
  push:
    tags:
      - 'v*'          # triggers on v1.0.0, v1.2.3, etc
  workflow_dispatch:  # lets you trigger manually from GitHub UI

jobs:
  build-msi:
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install -r src/requirements.txt
          pip install pyinstaller

      - name: Download JRE from Adoptium
        shell: pwsh
        run: |
          $jreUrl = "https://api.adoptium.net/v3/binary/latest/21/ga/windows/x64/jre/hotspot/normal/eclipse"
          $jreZip = "jre-windows.zip"
          Invoke-WebRequest -Uri $jreUrl -OutFile $jreZip
          Expand-Archive -Path $jreZip -DestinationPath "runtimes/jdk21"
          # flatten one level if Adoptium wraps in a subfolder
          $inner = Get-ChildItem "runtimes/jdk21" | Select-Object -First 1
          if ($inner.PSIsContainer) {
            Get-ChildItem $inner.FullName | Move-Item -Destination "runtimes/jdk21"
            Remove-Item $inner.FullName
          }

      - name: Build executable with PyInstaller
        run: |
          pyinstaller mcagent.spec

      - name: Install WiX Toolset
        run: |
          dotnet tool install --global wix --version 4.0.5
          wix extension add WixToolset.UI.wixext/4.0.5

      - name: Create WiX source file
        shell: pwsh
        run: |
          $refName = "${{ github.ref_name }}"
          $version = if ($refName -match '^\d') { $refName } else { "1.0.0" }
          $version = $version.TrimStart('v')
          @"
          <?xml version="1.0" encoding="UTF-8"?>
          <Wix xmlns="http://wixtoolset.org/schemas/v4/wxs"
               xmlns:ui="http://wixtoolset.org/schemas/v4/wxs/ui">
            <Package Name="MC Manager Agent"
                    Manufacturer="Ni Lang"
                    Version="$version.0"
                    UpgradeCode="5f69dbfd-1007-4d54-9bad-f694f42ae568">

              <MajorUpgrade DowngradeErrorMessage="A newer version is already installed." />
              <MediaTemplate EmbedCab="yes" />

              <ui:WixUI Id="WixUI_Minimal" />

              <Property Id="AGENT_NAME" Secure="yes" />
              <Property Id="LINK_CODE" Secure="yes" />

              <UI>
                <Dialog Id="LinkingDlg" Width="370" Height="270" Title="Link Your Agent">
                  <Control Id="Title" Type="Text" X="15" Y="15" Width="340" Height="20"
                          Text="{\WixUI_Font_Title}Agent Setup" />
                  <Control Id="Desc" Type="Text" X="25" Y="45" Width="320" Height="30"
                          Text="Enter your agent name and linking code from the MC Manager dashboard." />

                  <Control Id="AgentNameLabel" Type="Text" X="25" Y="90" Width="150" Height="15"
                          Text="Agent Name:" />
                  <Control Id="AgentNameEdit" Type="Edit" X="25" Y="105" Width="320" Height="20"
                          Property="AGENT_NAME" />

                  <Control Id="LinkCodeLabel" Type="Text" X="25" Y="135" Width="150" Height="15"
                          Text="Linking Code:" />
                  <Control Id="LinkCodeEdit" Type="Edit" X="25" Y="150" Width="320" Height="20"
                          Property="LINK_CODE" />

                  <Control Id="Next" Type="PushButton" X="236" Y="243" Width="56" Height="17"
                          Default="yes" Text="Next">
                    <Publish Event="NewDialog" Value="VerifyReadyDlg" />
                  </Control>
                  <Control Id="Back" Type="PushButton" X="180" Y="243" Width="56" Height="17"
                          Text="Back">
                    <Publish Event="NewDialog" Value="WelcomeDlg" />
                  </Control>
                  <Control Id="Cancel" Type="PushButton" X="304" Y="243" Width="56" Height="17"
                          Cancel="yes" Text="Cancel">
                    <Publish Event="SpawnDialog" Value="CancelDlg" />
                  </Control>
                </Dialog>

                <InstallUISequence>
                  <Show Dialog="LinkingDlg" After="WelcomeDlg" Condition="NOT Installed" />
                </InstallUISequence>
              </UI>

              <!-- WriteConfig -->
              <Property Id="WriteConfigCmd" Value="powershell.exe" />
              <CustomAction Id="WriteConfig"
                            Execute="deferred"
                            Impersonate="yes"
                            Property="WriteConfigCmd"
                            ExeCommand="-ExecutionPolicy Bypass -Command &quot;
                              `$base = &quot;`$env:APPDATA\MCAgent\config&quot;;
                              New-Item -Force -ItemType Directory `$base | Out-Null;
                              @{ agent_name = '[AGENT_NAME]'; link_code = '[LINK_CODE]'; linked = `$false } |
                              ConvertTo-Json | Out-File &quot;`$base\agent.json&quot; -Encoding UTF8
                            &quot;"
                            Return="check" />

              <!-- FirewallRule -->
              <Property Id="FirewallCmd" Value="powershell.exe" />
              <CustomAction Id="FirewallRule"
                            Execute="deferred"
                            Impersonate="no"
                            Property="FirewallCmd"
                            ExeCommand="-ExecutionPolicy Bypass -Command &quot;
                              New-NetFirewallRule -DisplayName 'MC Manager Agent - Java' ``
                                -Direction Inbound ``
                                -Program &quot;`$env:APPDATA\MCAgent\runtimes\jdk21\bin\java.exe&quot; ``
                                -Action Allow -Profile Any | Out-Null
                            &quot;"
                            Return="ignore" />

              <InstallExecuteSequence>
                <Custom Action="WriteConfig" After="InstallFinalize" Condition="NOT Installed" />
                <Custom Action="FirewallRule" After="WriteConfig" Condition="NOT Installed" />
              </InstallExecuteSequence>

              <Feature Id="MainFeature" Title="MC Manager Agent" Level="1">
                <ComponentGroupRef Id="MainComponents" />
              </Feature>

              <StandardDirectory Id="ProgramFiles6432Folder">
                <Directory Id="INSTALLFOLDER" Name="MC Manager Agent">
                  <Component Id="MainExecutable" Guid="*">
                    <File Source="dist\mcagent.exe" />
                  </Component>
                </Directory>
              </StandardDirectory>

              <ComponentGroup Id="MainComponents">
                <ComponentRef Id="MainExecutable" />
              </ComponentGroup>
              <MediaTemplate EmbedCab="yes" />
            </Package>
          </Wix>
          "@ | Out-File -FilePath "mcagent.wxs" -Encoding UTF8

      - name: Build MSI
        run: |
          wix build mcagent.wxs -o mcagent.msi -arch x64 -ext WixToolset.UI.wixext

      - name: Upload MSI as release artifact
        uses: actions/upload-artifact@v4
        with:
          name: mcagent-installer
          path: mcagent.msi

      - name: Attach MSI to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: mcagent.msi