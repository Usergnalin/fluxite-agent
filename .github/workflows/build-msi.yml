name: Build MSI Installer

on:
  push:
    tags:
      - 'v*'          # triggers on v1.0.0, v1.2.3, etc
  workflow_dispatch:  # lets you trigger manually from GitHub UI

jobs:
  build-msi:
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install -r src/requirements.txt
          pip install pyinstaller

      - name: Download JRE from Adoptium
        shell: pwsh
        run: |
          $jreUrl = "https://api.adoptium.net/v3/binary/latest/21/ga/windows/x64/jre/hotspot/normal/eclipse"
          $jreZip = "jre-windows.zip"
          Invoke-WebRequest -Uri $jreUrl -OutFile $jreZip
          Expand-Archive -Path $jreZip -DestinationPath "runtimes/jdk21"
          # flatten one level if Adoptium wraps in a subfolder
          $inner = Get-ChildItem "runtimes/jdk21" | Select-Object -First 1
          if ($inner.PSIsContainer) {
            Get-ChildItem $inner.FullName | Move-Item -Destination "runtimes/jdk21"
            Remove-Item $inner.FullName
          }

      - name: Build executable with PyInstaller
        run: |
          pyinstaller mcagent.spec

      - name: Install WiX Toolset
        run: |
          dotnet tool install --global wix --version 4.0.5

      - name: Create WiX source file
        shell: pwsh
        run: |
          $refName = "${{ github.ref_name }}"
          $version = if ($refName -match '^\d') { $refName } else { "1.0.0" }
          $version = $version.TrimStart('v')
          @"
          <?xml version="1.0" encoding="UTF-8"?>
          <Wix xmlns="http://wixtoolset.org/schemas/v4/wxs">
            <Package Name="MC Manager Agent"
                    Manufacturer="Ni Lang"
                    Version="$version.0"
                    UpgradeCode="5f69dbfd-1007-4d54-9bad-f694f42ae568">
              <MajorUpgrade DowngradeErrorMessage="A newer version is already installed." />
              <MediaTemplate EmbedCab="yes" />

              <Property Id="SETUP_SCRIPT" Value="[INSTALLFOLDER]setup.ps1" />

              <CustomAction Id="CreateAppDataDirs"
                            Execute="deferred"
                            Impersonate="yes"
                            ExeCommand="powershell -ExecutionPolicy Bypass -Command &quot;
                              `$base = &quot;`$env:APPDATA\MCAgent&quot;;
                              New-Item -Force -ItemType Directory &quot;`$base\servers&quot; | Out-Null;
                              New-Item -Force -ItemType Directory &quot;`$base\logs&quot; | Out-Null;
                              New-Item -Force -ItemType Directory &quot;`$base\installers&quot; | Out-Null;
                              New-Item -Force -ItemType Directory &quot;`$base\runtimes\jdk21&quot; | Out-Null;
                              `$jreUrl = 'https://api.adoptium.net/v3/binary/latest/21/ga/windows/x64/jre/hotspot/normal/eclipse';
                              Invoke-WebRequest `$jreUrl -OutFile &quot;`$env:TEMP\jre.zip&quot;;
                              Expand-Archive &quot;`$env:TEMP\jre.zip&quot; &quot;`$env:TEMP\jre_extract&quot; -Force;
                              `$inner = Get-ChildItem &quot;`$env:TEMP\jre_extract&quot; | Select-Object -First 1;
                              if (`$inner.PSIsContainer) {
                                Get-ChildItem `$inner.FullName | Move-Item -Destination &quot;`$base\runtimes\jdk21&quot; -Force
                              };
                              `$fabricUrl = 'https://maven.fabricmc.net/net/fabricmc/fabric-installer/1.1.1/fabric-installer-1.1.1.jar';
                              Invoke-WebRequest `$fabricUrl -OutFile &quot;`$base\installers\fabric-installer.jar&quot;;
                              `$quiltUrl = 'https://quiltmc.org/api/v1/download-latest-installer/java-universal';
                              Invoke-WebRequest `$quiltUrl -OutFile &quot;`$base\installers\quilt-installer.jar&quot;
                            &quot;"
                            Return="ignore" />

              <InstallExecuteSequence>
                <Custom Action="CreateAppDataDirs" After="InstallFinalize">NOT Installed</Custom>
              </InstallExecuteSequence>

              <Feature Id="MainFeature" Title="MC Manager Agent" Level="1">
                <ComponentGroupRef Id="MainComponents" />
              </Feature>

              <StandardDirectory Id="ProgramFiles6432Folder">
                <Directory Id="INSTALLFOLDER" Name="MC Manager Agent">
                  <Component Id="MainExecutable" Guid="*">
                    <File Source="dist\mcagent.exe" />
                  </Component>
                </Directory>
              </StandardDirectory>

              <ComponentGroup Id="MainComponents">
                <ComponentRef Id="MainExecutable" />
              </ComponentGroup>

            </Package>
          </Wix>
          "@ | Out-File -FilePath "mcagent.wxs" -Encoding UTF8

      - name: Build MSI
        run: |
          wix build mcagent.wxs -o mcagent.msi

      - name: Upload MSI as release artifact
        uses: actions/upload-artifact@v4
        with:
          name: mcagent-installer
          path: mcagent.msi

      - name: Attach MSI to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: mcagent.msi